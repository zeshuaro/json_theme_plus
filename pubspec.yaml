name: json_theme_plus
description: A library to dynamically generate a ThemeData object from a JSON file or dynamic map object
homepage: https://github.com/zeshuaro/json_theme_plus
version: 7.0.0

environment:
  sdk: ">=3.9.4 <4.0.0"
  flutter: ">=3.38.10"

dependencies:
  flutter:
    sdk: flutter
  json_class: ^3.0.1
  json_schema: ^5.2.2
  json_theme_annotation: ^2.0.0
  logging: ^1.3.0
  meta: ^1.12.0

dev_dependencies:
  build_runner: 2.13.1
  code_builder: 4.11.1
  flutter_lints: 6.0.0
  flutter_test:
    sdk: flutter
  json_theme_codegen: 3.0.0
  recase: 4.1.0

false_secrets:
  - /node_modules
